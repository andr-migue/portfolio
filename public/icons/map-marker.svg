<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 44" width="32" height="44">
  <defs>
    <linearGradient id="mm-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff4d4d"/>
      <stop offset="100%" stop-color="#b30000"/>
    </linearGradient>
    <radialGradient id="mm-shine" cx="0.35" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="mm-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.8"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <path
    d="M16 1 C7.7 1 1.5 7.2 1.5 15.4 C1.5 26 16 43 16 43 C16 43 30.5 26 30.5 15.4 C30.5 7.2 24.3 1 16 1 Z"
    fill="url(#mm-body)"
    stroke="#7a0000"
    stroke-width="1"
    filter="url(#mm-shadow)"
  />

  <ellipse cx="12" cy="11" rx="7" ry="5" fill="url(#mm-shine)"/>

  <circle cx="16" cy="15.4" r="4.5" fill="#ffffff"/>
  <circle cx="16" cy="15.4" r="3" fill="#b30000"/>
</svg>
