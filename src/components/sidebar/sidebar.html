<aside class="sidebar" aria-label="Resumen de sección">
  <div class="profile-card">
    <img
      class="profile-card__image"
      src="{{PROFILE_IMAGE_SRC}}"
      alt="{{PROFILE_IMAGE_ALT}}"
    />
    <h2 class="profile-card__name">{{PROFILE_NAME}}</h2>
    <p class="profile-card__role">{{PROFILE_ROLE}}</p>
  </div>

  <div class="sidebar__section-summary">
    <h2 id="section-summary-title">{{SUMMARY_TITLE}}</h2>
    <p id="section-summary-description">{{SUMMARY_DESCRIPTION}}</p>
    <ul class="sidebar-fields" id="section-sidebar-fields">
      {{SIDEBAR_FIELDS}}
    </ul>
  </div>
</aside>
